<div class="logo-wrapper">
  <a href="{{ "/" | relLangURL }}" class="logo">
      <img src="{{ .Site.BaseURL }}{{ .Site.Params.logoPath }}" class="logo-img">
  </a>
</div>

{{ partial "header/language-selector.html" . }}

<nav class="site-navbar">
  <ul id="menu" class="menu">
    {{ range .Site.Menus.main -}}
      <li class="menu-item">
        <a class="menu-item-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}" href="{{ .URL | safeURL }}">{{ .Name }}</a>
      </li>
    {{- end }}
  </ul>
</nav>
